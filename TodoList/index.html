<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do List — CodeAlpha</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ec;
    --surface: #ffffff;
    --ink: #1a1814;
    --ink-dim: rgba(26,24,20,0.45);
    --ink-faint: rgba(26,24,20,0.08);
    --accent: #e85d2f;
    --accent-dim: rgba(232,93,47,0.1);
    --green: #2a7a4b;
    --green-dim: rgba(42,122,75,0.1);
    --border: rgba(26,24,20,0.1);
    --radius: 16px;
    --shadow: 0 2px 16px rgba(26,24,20,0.08), 0 1px 2px rgba(26,24,20,0.04);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
    position: relative;
  }

  /* Decorative grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--ink-faint) 1px, transparent 1px),
      linear-gradient(90deg, var(--ink-faint) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* Header */
  header {
    margin-bottom: 32px;
    animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: clamp(2.4rem, 8vw, 3.2rem);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .date-line {
    margin-top: 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
    animation: slideDown 0.6s 0.08s cubic-bezier(0.16,1,0.3,1) both;
  }

  .stat-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .stat-pill:first-child { border-radius: 50px 8px 8px 50px; }
  .stat-pill:last-child  { border-radius: 8px 50px 50px 8px; }

  .stat-num {
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-lbl {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 2px;
  }

  .stat-pill.done .stat-num { color: var(--green); }
  .stat-pill.pending .stat-num { color: var(--accent); }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: var(--ink-faint);
    border-radius: 50px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #4caf75);
    border-radius: 50px;
    transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    width: 0%;
  }

  /* Input area */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
    display: flex;
    gap: 6px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    animation: slideDown 0.6s 0.12s cubic-bezier(0.16,1,0.3,1) both;
  }

  .task-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    padding: 12px 14px;
  }

  .task-input::placeholder { color: var(--ink-dim); }

  .add-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }

  .add-btn:hover { background: var(--accent); transform: scale(1.02); }
  .add-btn:active { transform: scale(0.98); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    animation: slideDown 0.6s 0.16s cubic-bezier(0.16,1,0.3,1) both;
  }

  .filter-btn {
    flex: 1;
    padding: 9px 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .filter-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
    box-shadow: 0 4px 16px rgba(26,24,20,0.2);
  }

  .filter-btn:not(.active):hover { border-color: var(--ink); color: var(--ink); }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: slideDown 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) both;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: opacity 0.25s, transform 0.25s;
    animation: taskIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes taskIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .task-item.removing {
    opacity: 0;
    transform: translateX(20px) scale(0.97);
    pointer-events: none;
  }

  .task-item.done-style { opacity: 0.55; }
  .task-item.done-style .task-text { text-decoration: line-through; }

  /* Checkbox */
  .check-wrap {
    flex-shrink: 0;
    width: 22px; height: 22px;
    position: relative;
  }

  .check-wrap input[type="checkbox"] { display: none; }

  .check-custom {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    background: transparent;
  }

  .check-wrap input:checked ~ .check-custom {
    background: var(--green);
    border-color: var(--green);
  }

  .check-custom svg {
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
  }

  .check-wrap input:checked ~ .check-custom svg {
    opacity: 1;
    transform: scale(1);
  }

  /* Task text & edit */
  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
  }

  .task-meta {
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 2px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .edit-input {
    width: 100%;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    background: var(--ink-faint);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    outline: none;
  }

  /* Action buttons */
  .actions { display: flex; gap: 4px; flex-shrink: 0; }

  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .icon-btn:hover { background: var(--ink-faint); border-color: var(--ink); }
  .icon-btn.delete:hover { background: rgba(232,93,47,0.1); border-color: var(--accent); }
  .icon-btn.save:hover { background: var(--green-dim); border-color: var(--green); }

  .icon-btn svg { width: 14px; height: 14px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    display: none;
    animation: fadeIn 0.4s ease both;
  }

  .empty.show { display: block; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 12px;
    display: block;
  }

  .empty-title {
    font-family: 'Instrument Serif', serif;
    font-size: 1.4rem;
    margin-bottom: 6px;
    color: var(--ink-dim);
  }

  .empty-sub {
    font-size: 12px;
    color: var(--ink-dim);
    font-weight: 500;
  }

  /* Clear all */
  .footer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    animation: slideDown 0.6s 0.24s cubic-bezier(0.16,1,0.3,1) both;
  }

  .clear-btn {
    background: none;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .clear-btn:hover { background: var(--accent-dim); }
  .clear-btn:disabled { opacity: 0.35; pointer-events: none; }

  .footer-brand {
    margin-top: 40px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-align: center;
    animation: slideDown 0.6s 0.28s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge"><span class="badge-dot"></span>CodeAlpha · Task 02</div>
    <h1>My <em>Tasks</em></h1>
    <div class="date-line" id="date-line"></div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-pill">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat-pill pending">
      <div class="stat-num" id="stat-pending">0</div>
      <div class="stat-lbl">Pending</div>
    </div>
    <div class="stat-pill done">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-lbl">Done</div>
    </div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

  <!-- Input -->
  <div class="input-card">
    <input class="task-input" id="task-input" type="text" placeholder="What needs to be done?" maxlength="200" />
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Done</button>
  </div>

  <!-- List -->
  <div class="task-list" id="task-list"></div>

  <!-- Empty state -->
  <div class="empty" id="empty">
    <span class="empty-icon">✦</span>
    <div class="empty-title">Nothing here yet</div>
    <div class="empty-sub">Add a task above to get started</div>
  </div>

  <!-- Footer bar -->
  <div class="footer-bar">
    <span id="footer-text">0 tasks</span>
    <button class="clear-btn" id="clear-btn" onclick="clearDone()" disabled>Clear done</button>
  </div>

  <div class="footer-brand">To-Do List · Web Development Internship · CodeAlpha</div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────────
  let tasks  = JSON.parse(localStorage.getItem('ca_tasks') || '[]');
  let filter = 'all';
  let editingId = null;

  function save() {
    localStorage.setItem('ca_tasks', JSON.stringify(tasks));
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  // ── Date line ────────────────────────────────────────────────────────────────
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  document.getElementById('date-line').textContent =
    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;

  // ── Filter ───────────────────────────────────────────────────────────────────
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Add task ─────────────────────────────────────────────────────────────────
  function addTask() {
    const input = document.getElementById('task-input');
    const text  = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id: genId(), text, done: false, created: Date.now() });
    input.value = '';
    save();
    render();
    input.focus();
  }

  // ── Toggle done ──────────────────────────────────────────────────────────────
  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  // ── Delete ───────────────────────────────────────────────────────────────────
  function deleteTask(id) {
    const el = document.getElementById('item-' + id);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save(); render();
      }, 250);
    }
  }

  // ── Edit ─────────────────────────────────────────────────────────────────────
  function startEdit(id) {
    editingId = id;
    render();
    const inp = document.getElementById('edit-' + id);
    if (inp) { inp.focus(); inp.select(); }
  }

  function saveEdit(id) {
    const inp = document.getElementById('edit-' + id);
    if (!inp) return;
    const val = inp.value.trim();
    if (val) {
      const t = tasks.find(t => t.id === id);
      if (t) t.text = val;
    }
    editingId = null;
    save(); render();
  }

  function cancelEdit() { editingId = null; render(); }

  // ── Clear done ───────────────────────────────────────────────────────────────
  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function render() {
    const total   = tasks.length;
    const done    = tasks.filter(t => t.done).length;
    const pending = total - done;
    const pct     = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('progress').style.width     = pct + '%';
    document.getElementById('footer-text').textContent  =
      total === 1 ? '1 task' : `${total} tasks`;
    document.getElementById('clear-btn').disabled = done === 0;

    const filtered = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });

    const list  = document.getElementById('task-list');
    const empty = document.getElementById('empty');

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.classList.add('show');
      if (filter === 'all') {
        empty.querySelector('.empty-title').textContent = 'Nothing here yet';
        empty.querySelector('.empty-sub').textContent   = 'Add a task above to get started';
        empty.querySelector('.empty-icon').textContent  = '✦';
      } else if (filter === 'active') {
        empty.querySelector('.empty-title').textContent = 'All caught up!';
        empty.querySelector('.empty-sub').textContent   = 'No pending tasks — great work!';
        empty.querySelector('.empty-icon').textContent  = '✓';
      } else {
        empty.querySelector('.empty-title').textContent = 'No done tasks yet';
        empty.querySelector('.empty-sub').textContent   = 'Complete some tasks to see them here';
        empty.querySelector('.empty-icon').textContent  = '○';
      }
      return;
    }

    empty.classList.remove('show');

    // Build HTML
    list.innerHTML = filtered.map(t => {
      const isEditing = editingId === t.id;
      const doneClass = t.done ? 'done-style' : '';
      const dateStr   = new Date(t.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      return `
      <div class="task-item ${doneClass}" id="item-${t.id}">
        <div class="check-wrap">
          <input type="checkbox" id="chk-${t.id}" ${t.done ? 'checked' : ''}
            onchange="toggleDone('${t.id}')" />
          <label class="check-custom" for="chk-${t.id}">
            <svg viewBox="0 0 12 10" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 5 4.5 8.5 11 1"/>
            </svg>
          </label>
        </div>

        <div class="task-body">
          ${isEditing
            ? `<input class="edit-input" id="edit-${t.id}" type="text" value="${escHtml(t.text)}"
                 onkeydown="if(event.key==='Enter')saveEdit('${t.id}');if(event.key==='Escape')cancelEdit();"
                 maxlength="200" />`
            : `<div class="task-text">${escHtml(t.text)}</div>
               <div class="task-meta">Added ${dateStr}${t.done ? ' · Completed' : ''}</div>`
          }
        </div>

        <div class="actions">
          ${isEditing
            ? `<button class="icon-btn save" title="Save" onclick="saveEdit('${t.id}')">
                 <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="2 8 6 12 14 4"/></svg>
               </button>
               <button class="icon-btn delete" title="Cancel" onclick="cancelEdit()">
                 <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
               </button>`
            : `<button class="icon-btn" title="Edit" onclick="startEdit('${t.id}')">
                 <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2l3 3-9 9H2v-3L11 2z"/></svg>
               </button>
               <button class="icon-btn delete" title="Delete" onclick="deleteTask('${t.id}')">
                 <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 5 13 5"/><path d="M5 5V3h6v2"/><path d="M4 5l1 9h6l1-9"/></svg>
               </button>`
          }
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Keyboard shortcut ─────────────────────────────────────────────────────────
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── Init ──────────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
